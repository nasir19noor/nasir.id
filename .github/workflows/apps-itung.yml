name: 'Deploy itung.nasir.id'

on:
  push:
    paths:
      - 'apps/iTung/frontend/**'
      - 'apps/iTung/backend/**'
      - 'apps/iTung/android/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  changes:
    runs-on: [self-hosted, nasir-contabo]
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      android: ${{ steps.filter.outputs.android }}
    steps:
    - name: Remove stale nested .git directories
      run: find "$GITHUB_WORKSPACE" -mindepth 2 -name ".git" -exec rm -rf {} + 2>/dev/null || true

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Detect changed paths
      uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          backend:
            - 'apps/iTung/backend/**'
          frontend:
            - 'apps/iTung/frontend/**'
          android:
            - 'apps/iTung/android/**'

  deploy-backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, nasir-contabo]
    steps:
    - name: Deploy backend
      env:
        FONNTE_TOKEN: ${{ secrets.FONNTE_TOKEN }}
        SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      working-directory: apps/iTung/backend
      run: |
        echo "Pulling .env from S3..."
        rm -f .env
        aws s3 cp s3://assets.itung.nasir.id/backend/.env .env

        echo "Stopping and removing existing backend container..."
        echo "$SSH_PASSWORD" | sudo -S docker stop itung-backend 2>/dev/null || true
        echo "$SSH_PASSWORD" | sudo -S docker rm itung-backend 2>/dev/null || true
        echo "$SSH_PASSWORD" | sudo -S docker rmi itung-backend:latest 2>/dev/null || true

        echo "Building backend image..."
        echo "$SSH_PASSWORD" | sudo -S docker build -t itung-backend:latest .

        echo "Running backend container..."
        echo "$SSH_PASSWORD" | sudo -S docker run -d --network host --env-file .env \
          -e GOOGLE_CLIENT_ID=943652190384-emo9evfro4d5n6rpabn1artu2brmtm9m.apps.googleusercontent.com \
          -e FONNTE_TOKEN=${FONNTE_TOKEN:-} \
          --name itung-backend itung-backend:latest

        echo "Backend deployed successfully"

  deploy-frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, nasir-contabo]
    steps:
    - name: Deploy frontend
      env:
        SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
      working-directory: apps/iTung/frontend
      run: |
        echo "Stopping and removing existing frontend container..."
        echo "$SSH_PASSWORD" | sudo -S docker stop itung-frontend 2>/dev/null || true
        echo "$SSH_PASSWORD" | sudo -S docker rm itung-frontend 2>/dev/null || true

        echo "Building frontend image..."
        echo "$SSH_PASSWORD" | sudo -S docker build \
          --build-arg NEXT_PUBLIC_API_URL=https://api.itung.nasir.id \
          --build-arg NEXT_PUBLIC_GOOGLE_CLIENT_ID=943652190384-emo9evfro4d5n6rpabn1artu2brmtm9m.apps.googleusercontent.com \
          -t itung-frontend:latest .

        echo "Running frontend container..."
        echo "$SSH_PASSWORD" | sudo -S docker run -d -p 5000:5000 --name itung-frontend itung-frontend:latest

        echo "Frontend deployed successfully"

  deploy-android:
    needs: changes
    if: ${{ needs.changes.outputs.android == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, nasir-contabo]
    steps:
    - name: Decode keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $GITHUB_WORKSPACE/apps/iTung/android/android/app/my-release-key.keystore

    - name: Build release AAB and APK
      working-directory: apps/iTung/android
      env:
        KEYSTORE_PATH: ${{ github.workspace }}/apps/iTung/android/android/app/my-release-key.keystore
        KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        export PATH=$PATH:$HOME/flutter/bin:$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools
        export ANDROID_HOME=$HOME/android-sdk

        flutter pub get

        echo "Building AAB..."
        flutter build appbundle --release

        echo "Building APK..."
        flutter build apk --release

    - name: Upload AAB and APK to S3
      run: |
        aws s3 rm s3://assets.itung.nasir.id/android/iTung.aab
        aws s3 cp apps/iTung/android/build/app/outputs/bundle/release/app-release.aab \
          s3://assets.itung.nasir.id/android/iTung.aab
        
        aws s3 rm s3://assets.itung.nasir.id/android/iTung.apk
        aws s3 cp apps/iTung/android/build/app/outputs/flutter-apk/app-release.apk \
          s3://assets.itung.nasir.id/android/iTung.apk

        echo "Android AAB and APK uploaded successfully"

    - name: Clean up keystore
      if: always()
      run: rm -f $GITHUB_WORKSPACE/apps/iTung/android/android/app/my-release-key.keystore
