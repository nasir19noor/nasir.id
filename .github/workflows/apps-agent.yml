name: Deploy Agent

# Runs on the self-hosted runner that lives on your VPS, so "deploy" just means
# rebuild the image and restart the container locally.
on:
  push:
    branches: [main]
    paths:
      - "agent/**"
      - "server.py"
      - "requirements.txt"
      - "Dockerfile"
      - "docker-compose.yml"

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build and (re)start
        run: |
          docker compose up -d --build

      - name: Health check
        run: |
          sleep 5
          curl -fsS http://localhost:8000/health
